name: Build WinPHP

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      release_tag:
        description: '手动发布: 想用的 tag 名 (留空只构建不发布)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if (Test-Path package-lock.json) {
            npm ci
          } else {
            npm install
          }

      - name: Wails doctor
        run: wails doctor

      - name: Build (Release)
        run: wails build -platform windows/amd64 -ldflags "-s -w" -trimpath

      - name: Show artifact
        id: artifact_info
        run: |
          dir build\bin
          $sz = (Get-Item build\bin\WinPHP.exe).Length / 1MB
          Write-Host ("Built: WinPHP.exe, size: {0:N1} MB" -f $sz)
          "size=$([math]::Round($sz,1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: WinPHP-windows-amd64-${{ github.sha }}
          path: build/bin/WinPHP.exe
          if-no-files-found: error

      # ─── 发布逻辑 ────────────────────────────────────
      # 调试: 打出当前事件信息, 失败时方便排查
      - name: Debug release context
        run: |
          echo "event_name = ${{ github.event_name }}"
          echo "ref        = ${{ github.ref }}"
          echo "ref_name   = ${{ github.ref_name }}"
          echo "actor      = ${{ github.actor }}"
          echo "sha        = ${{ github.sha }}"
          echo "is_tag     = ${{ startsWith(github.ref, 'refs/tags/') }}"
          echo "default_br = ${{ github.event.repository.default_branch }}"

      # 1) push tag v* → 正式版 release
      - name: Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/WinPHP.exe
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          make_latest: 'true'
          fail_on_unmatched_files: true
          body: |
            **WinPHP ${{ github.ref_name }}** — Windows 一键部署面板 (PHP/MySQL/Nginx/PostgreSQL)

            体积: ${{ steps.artifact_info.outputs.size }} MB · 单文件 EXE · 双击运行需管理员权限

            下载 `WinPHP.exe`, 放空目录, 右键 → 以管理员身份运行.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2) 手动 dispatch 给了 release_tag → 用该 tag 创建 release
      - name: Release (manual dispatch with tag)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/WinPHP.exe
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: false
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3) 任何非 tag 的 push (含分支 push / 合并) → 更新 'latest' 滚动 release
      #    简化条件: 只要不是 tag 触发就跑. 不限定分支名.
      - name: Release (rolling latest)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/WinPHP.exe
          tag_name: latest
          name: 'Latest Build'
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: 'true'
          body: |
            **滚动构建 (会被下次 push 覆盖)**

            来源分支: `${{ github.ref_name }}`
            提交: `${{ github.sha }}`
            体积: ${{ steps.artifact_info.outputs.size }} MB

            这是开发版本 (prerelease). 想要稳定版请等推 `v*` tag.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        if: always()
        run: echo "Build & release step complete. 看 Releases 页 https://github.com/${{ github.repository }}/releases"
