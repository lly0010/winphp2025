name: Build WinPHP

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if (Test-Path package-lock.json) { npm ci }
          else { npm install }

      - name: Wails doctor
        run: wails doctor

      - name: Build (Release)
        run: wails build -platform windows/amd64 -ldflags "-s -w" -trimpath

      - name: Show artifact
        run: |
          dir build\bin
          $sz = (Get-Item build\bin\WinPHP.exe).Length / 1MB
          Write-Host ("Built: WinPHP.exe, size: {0:N1} MB" -f $sz)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinPHP-windows-amd64
          path: build/bin/WinPHP.exe
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/WinPHP.exe
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
